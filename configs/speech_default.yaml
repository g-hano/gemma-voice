# Turkish Gemma 4 E2B → Mimi speech-head (Frisson-style)
# Dataset: CC BY 4.0 — https://huggingface.co/datasets/Anilosan15/Synthetic_Turkish_TTS_Data
gemma_model_id: google/gemma-4-E2B-it
freeze_gemma: true
gemma_dtype: bfloat16
num_tap_layers: 6
gradient_checkpointing: true
mimi_model_id: kyutai/mimi
freeze_mimi: true
num_codebooks: 8
mimi_sample_rate: 24000
max_audio_seconds: 30.0
min_audio_seconds: 0.5
head_hidden_dim: 2560
max_speech_frames: 375
text_prompt_template: "Bunu doğal bir konuşma gibi söyle:\n{text}"
max_text_length: 512
min_text_chars: 4
max_text_chars: 500
training_mode: generated_answer
max_new_tokens: 48
generation_prompt_template: "Şunu kısa ve Türkçe yanıtla:\n{question}"
generated_question_template: "Aşağıdaki konuda kısa bir Türkçe cümle söyle:\n{context}"
dataset_question_column: null
use_generated_answer_states: true
dataset_name: Anilosan15/Synthetic_Turkish_TTS_Data
dataset_config: null
dataset_split: train
dataset_text_column: text
dataset_audio_column: audio
max_samples: 512
val_fraction: 0.1
filter_dataset: false
use_demo_dataset: false
cache_speech_tokens: true
cache_dir: data/speech_token_cache
output_dir: outputs/speech_head
learning_rate: 3.0e-4
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
max_steps: 500
bf16: true
report_to: none